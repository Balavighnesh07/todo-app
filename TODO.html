<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart To-Do Dashboard</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ========== RESET & BASE ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      transition: background-color 0.3s, color 0.3s, border-color 0.3s;
    }

    body {
      min-height: 100vh;
      padding: 20px;
      background: #f0f4f8;
    }

    body.dark-mode {
      background: #0f1724;
      color: #e8edf2;
    }

    .app-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ========== HEADER ========== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 25px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      padding: 20px 30px;
      border-radius: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.06);
      border: 1px solid rgba(255,255,255,0.5);
    }

    body.dark-mode .header {
      background: rgba(20, 30, 50, 0.7);
      border-color: rgba(255,255,255,0.05);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-left h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #2a7faa, #4ca1d9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-icon {
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(0,0,0,0.06);
      padding: 10px 18px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1a3a4e;
      backdrop-filter: blur(4px);
    }

    body.dark-mode .btn-icon {
      background: rgba(255,255,255,0.05);
      color: #c8d8e8;
      border-color: rgba(255,255,255,0.08);
    }

    .btn-icon:hover {
      background: rgba(42, 127, 170, 0.15);
      transform: translateY(-2px);
    }

    /* ========== STATS CARDS ========== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      margin-bottom: 25px;
    }

    .stat-card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      padding: 20px;
      border-radius: 24px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
      transition: transform 0.2s;
    }

    body.dark-mode .stat-card {
      background: rgba(20, 30, 50, 0.6);
      border-color: rgba(255,255,255,0.05);
    }

    .stat-card:hover {
      transform: translateY(-4px);
    }

    .stat-card i {
      font-size: 2rem;
      margin-bottom: 6px;
    }

    .stat-number {
      display: block;
      font-size: 2.2rem;
      font-weight: 700;
      color: #0b1e2b;
    }

    body.dark-mode .stat-number {
      color: #e8edf2;
    }

    .stat-label {
      font-size: 0.85rem;
      color: #5a7a8e;
      font-weight: 500;
    }

    body.dark-mode .stat-label {
      color: #8aa8bc;
    }

    /* ========== TOOLBAR ========== */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(8px);
      padding: 15px 20px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.4);
    }

    body.dark-mode .toolbar {
      background: rgba(20, 30, 50, 0.5);
      border-color: rgba(255,255,255,0.05);
    }

    .toolbar input,
    .toolbar select {
      padding: 10px 16px;
      border-radius: 50px;
      border: 1px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.7);
      font-size: 0.95rem;
      outline: none;
      flex: 1;
      min-width: 140px;
    }

    body.dark-mode .toolbar input,
    body.dark-mode .toolbar select {
      background: rgba(255,255,255,0.05);
      color: #e8edf2;
      border-color: rgba(255,255,255,0.08);
    }

    .toolbar input:focus {
      border-color: #3a9bd5;
      box-shadow: 0 0 0 3px rgba(58, 155, 213, 0.15);
    }

    .filter-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 18px;
      border-radius: 50px;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.4);
      cursor: pointer;
      font-weight: 500;
      font-size: 0.85rem;
    }

    body.dark-mode .filter-btn {
      background: rgba(255,255,255,0.04);
      color: #b0c8da;
    }

    .filter-btn.active {
      background: #3a9bd5;
      color: white;
    }

    .filter-btn:hover:not(.active) {
      background: rgba(58, 155, 213, 0.12);
    }

    /* ========== PROGRESS BAR ========== */
    .progress-section {
      margin-bottom: 25px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-weight: 500;
      color: #2c4a5e;
    }

    body.dark-mode .progress-header {
      color: #b0c8da;
    }

    .progress-track {
      background: rgba(0,0,0,0.05);
      border-radius: 50px;
      height: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }

    body.dark-mode .progress-track {
      background: rgba(255,255,255,0.05);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3a9bd5, #6ab5e8);
      border-radius: 50px;
      transition: width 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.1);
      width: 0%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      font-size: 0.65rem;
      font-weight: 600;
      color: white;
    }

    /* ========== MAIN GRID ========== */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-bottom: 25px;
    }

    @media (max-width: 900px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ========== TASK LIST ========== */
    .task-section {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }

    body.dark-mode .task-section {
      background: rgba(20, 30, 50, 0.6);
      border-color: rgba(255,255,255,0.05);
    }

    .task-section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      font-weight: 600;
      color: #1a3a4e;
    }

    body.dark-mode .task-section-title {
      color: #c8d8e8;
    }

    .add-task-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .add-task-row input[type="text"] {
      flex: 2;
      padding: 12px 18px;
      border-radius: 50px;
      border: 1px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.7);
      font-size: 0.95rem;
      outline: none;
      min-width: 140px;
    }

    body.dark-mode .add-task-row input[type="text"] {
      background: rgba(255,255,255,0.05);
      color: #e8edf2;
      border-color: rgba(255,255,255,0.08);
    }

    .add-task-row select,
    .add-task-row input[type="date"] {
      padding: 12px 16px;
      border-radius: 50px;
      border: 1px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      outline: none;
    }

    body.dark-mode .add-task-row select,
    body.dark-mode .add-task-row input[type="date"] {
      background: rgba(255,255,255,0.05);
      color: #e8edf2;
      border-color: rgba(255,255,255,0.08);
    }

    .add-btn {
      padding: 12px 28px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #1f6e93, #3a9bd5);
      color: white;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(58, 155, 213, 0.3);
    }

    .add-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 20px rgba(58, 155, 213, 0.4);
    }

    /* ========== TASK ITEMS ========== */
    .task-list {
      max-height: 480px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-list::-webkit-scrollbar {
      width: 4px;
    }
    .task-list::-webkit-scrollbar-thumb {
      background: #b3cfdf;
      border-radius: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.6);
      padding: 12px 18px;
      border-radius: 60px;
      border: 1px solid rgba(0,0,0,0.02);
      transition: all 0.2s;
      flex-wrap: wrap;
    }

    body.dark-mode .task-item {
      background: rgba(255,255,255,0.04);
    }

    .task-item:hover {
      background: rgba(255,255,255,0.85);
      transform: translateX(4px);
    }

    body.dark-mode .task-item:hover {
      background: rgba(255,255,255,0.08);
    }

    .task-item .task-text {
      flex: 1;
      font-weight: 450;
      color: #133141;
      min-width: 120px;
    }

    body.dark-mode .task-item .task-text {
      color: #d0dce8;
    }

    .task-item .task-text.done {
      text-decoration: line-through;
      color: #7899ae;
    }

    .task-item .badge-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .priority-badge {
      font-size: 0.7rem;
      padding: 3px 12px;
      border-radius: 30px;
      font-weight: 600;
    }

    .priority-high { background: #ffebee; color: #c62828; }
    .priority-medium { background: #fff3e0; color: #e65100; }
    .priority-low { background: #e8f5e9; color: #2e7d32; }

    body.dark-mode .priority-high { background: #4a1a1a; color: #ff6b6b; }
    body.dark-mode .priority-medium { background: #4a2a1a; color: #ffb74d; }
    body.dark-mode .priority-low { background: #1a3a1a; color: #66bb6a; }

    .due-badge {
      font-size: 0.7rem;
      padding: 3px 12px;
      border-radius: 30px;
      background: #e3f2fd;
      color: #0d47a1;
    }

    body.dark-mode .due-badge {
      background: #1a2a4a;
      color: #64b5f6;
    }

    .overdue-badge {
      font-size: 0.7rem;
      padding: 3px 12px;
      border-radius: 30px;
      background: #ffebee;
      color: #c62828;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .status-badge {
      font-size: 0.7rem;
      padding: 3px 12px;
      border-radius: 30px;
      background: #eef4f8;
      color: #2b5f7a;
    }

    .status-badge.done-badge {
      background: #cfe4f0;
      color: #135a7a;
    }

    .task-actions {
      display: flex;
      gap: 4px;
    }

    .task-actions button {
      background: transparent;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 40px;
      cursor: pointer;
      color: #4b6f84;
      font-size: 1rem;
      transition: 0.15s;
    }

    .task-actions .complete-btn { color: #3a9bd5; }
    .task-actions .complete-btn:hover { background: #d7ebf7; color: #0f6790; }
    .task-actions .delete-btn:hover { background: #ffe3e3; color: #c24a4a; }

    /* ========== RIGHT PANEL ========== */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    /* ========== CHART ========== */
    .chart-section {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.5);
    }

    body.dark-mode .chart-section {
      background: rgba(20, 30, 50, 0.6);
      border-color: rgba(255,255,255,0.05);
    }

    .chart-wrapper {
      position: relative;
      height: 220px;
      max-width: 100%;
    }

    /* ========== STREAK & ACTIVITY ========== */
    .streak-section {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    body.dark-mode .streak-section {
      background: rgba(20, 30, 50, 0.6);
      border-color: rgba(255,255,255,0.05);
    }

    .streak-display {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .streak-number {
      font-size: 2.5rem;
      font-weight: 700;
      color: #ff6b35;
    }

    .streak-label {
      font-size: 0.9rem;
      color: #5a7a8e;
    }

    body.dark-mode .streak-label {
      color: #8aa8bc;
    }

    .quote-box {
      font-style: italic;
      color: #5a7a8e;
      max-width: 300px;
      text-align: right;
    }

    body.dark-mode .quote-box {
      color: #8aa8bc;
    }

    /* ========== ACTIVITY FEED ========== */
    .feed-section {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.5);
    }

    body.dark-mode .feed-section {
      background: rgba(20, 30, 50, 0.6);
      border-color: rgba(255,255,255,0.05);
    }

    .feed-list {
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .feed-list::-webkit-scrollbar {
      width: 4px;
    }
    .feed-list::-webkit-scrollbar-thumb {
      background: #b3cfdf;
      border-radius: 10px;
    }

    .feed-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.3);
      border-radius: 50px;
      font-size: 0.9rem;
    }

    body.dark-mode .feed-item {
      background: rgba(255,255,255,0.03);
    }

    .feed-item .feed-time {
      font-size: 0.7rem;
      color: #6b8b9e;
      margin-left: auto;
    }

    /* ========== BOTTOM BAR ========== */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 20px;
      padding: 15px 25px;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.4);
    }

    body.dark-mode .bottom-bar {
      background: rgba(20, 30, 50, 0.5);
      border-color: rgba(255,255,255,0.05);
    }

    .bottom-bar .btn {
      padding: 10px 24px;
      border-radius: 50px;
      border: 1px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    body.dark-mode .bottom-bar .btn {
      background: rgba(255,255,255,0.05);
      color: #c8d8e8;
    }

    .bottom-bar .btn:hover {
      background: rgba(42, 127, 170, 0.12);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 600px) {
      .header { flex-direction: column; align-items: stretch; }
      .header-actions { justify-content: center; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .add-task-row { flex-direction: column; }
      .add-task-row input, .add-task-row select { width: 100%; }
      .toolbar { flex-direction: column; }
      .filter-btns { justify-content: center; }
      .streak-section { flex-direction: column; text-align: center; }
      .quote-box { text-align: center; margin-top: 10px; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-left">
      <i class="fas fa-tasks" style="font-size: 2rem; color: #3a9bd5;"></i>
      <h1>Smart Dashboard</h1>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="themeToggle"><i class="fas fa-moon"></i> Dark</button>
      <button class="btn-icon" id="exportBtn"><i class="fas fa-download"></i> Export</button>
      <button class="btn-icon" id="printBtn"><i class="fas fa-print"></i> Print</button>
    </div>
  </header>

  <!-- ===== STATS ===== -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <i class="fas fa-list" style="color: #3a9bd5;"></i>
      <span class="stat-number" id="totalTasks">0</span>
      <span class="stat-label">Total Tasks</span>
    </div>
    <div class="stat-card">
      <i class="fas fa-check-circle" style="color: #4CAF50;"></i>
      <span class="stat-number" id="completedTasks">0</span>
      <span class="stat-label">Completed</span>
    </div>
    <div class="stat-card">
      <i class="fas fa-hourglass-half" style="color: #FF9800;"></i>
      <span class="stat-number" id="pendingTasks">0</span>
      <span class="stat-label">Pending</span>
    </div>
    <div class="stat-card">
      <i class="fas fa-chart-line" style="color: #2196F3;"></i>
      <span class="stat-number" id="rateTasks">0%</span>
      <span class="stat-label">Completion Rate</span>
    </div>
  </div>

  <!-- ===== TOOLBAR ===== -->
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍 Search tasks..." />
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>
    <select id="sortSelect">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="alphabetical">A-Z</option>
    </select>
  </div>

  <!-- ===== PROGRESS ===== -->
  <div class="progress-section">
    <div class="progress-header">
      <span>Overall Progress</span>
      <span id="progressLabel">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%;">0%</div>
    </div>
  </div>

  <!-- ===== DASHBOARD GRID ===== -->
  <div class="dashboard-grid">
    <!-- LEFT: TASK LIST -->
    <div class="task-section">
      <div class="task-section-title">
        <span><i class="fas fa-clipboard-list"></i> Task List</span>
        <span id="taskCount">0 tasks</span>
      </div>

      <div class="add-task-row">
        <input type="text" id="taskInput" placeholder="What needs to be done?" />
        <select id="prioritySelect">
          <option value="low">🟢 Low</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
        <input type="date" id="dueDateInput" />
        <button class="add-btn" id="addBtn"><i class="fas fa-plus"></i> Add</button>
      </div>

      <div class="task-list" id="taskList">
        <div style="text-align:center; padding:30px; color:#7899ae;">✨ No tasks yet — add one above!</div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <!-- CHART -->
      <div class="chart-section">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-weight:600; color:#1a3a4e;">
          <span><i class="fas fa-chart-pie"></i> Task Distribution</span>
        </div>
        <div class="chart-wrapper">
          <canvas id="progressChart"></canvas>
        </div>
      </div>

      <!-- STREAK & QUOTE -->
      <div class="streak-section">
        <div class="streak-display">
          <i class="fas fa-fire" style="font-size: 2.5rem; color: #ff6b35;"></i>
          <div>
            <span class="streak-number" id="streakCount">0</span>
            <span class="streak-label">day streak 🔥</span>
          </div>
        </div>
        <div class="quote-box" id="quoteBox">
          "Start where you are. Use what you have. Do what you can."
        </div>
      </div>

      <!-- ACTIVITY FEED -->
      <div class="feed-section">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-weight:600; color:#1a3a4e;">
          <span><i class="fas fa-clock-rotate-left"></i> Activity Feed</span>
          <span style="font-size:0.75rem; opacity:0.6;" id="feedCount">0 entries</span>
        </div>
        <div class="feed-list" id="feedList">
          <div style="text-align:center; padding:15px; color:#7899ae;">
            <i class="fas fa-circle-info"></i> No activity yet
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== BOTTOM BAR ===== -->
  <div class="bottom-bar">
    <span style="color:#5a7a8e;">
      <i class="fas fa-tag"></i> 
      <span id="categoryStats">All categories</span>
    </span>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn" id="clearCompletedBtn"><i class="fas fa-check-double"></i> Clear Completed</button>
      <button class="btn" id="clearAllBtn"><i class="fas fa-trash"></i> Clear All</button>
    </div>
  </div>
</div>

<script>
  // ============================================================
  //  STATE
  // ============================================================
  let tasks = [];
  let feed = [];
  let streak = 0;
  let currentFilter = 'all';
  let chartInstance = null;

  // Quotes
  const quotes = [
    "Start where you are. Use what you have. Do what you can.",
    "The secret of getting ahead is getting started.",
    "Don't watch the clock; do what it does. Keep going.",
    "Success is the sum of small efforts repeated day in and day out.",
    "Believe you can and you're halfway there.",
    "Act as if what you do makes a difference. It does.",
    "What you get by achieving your goals is not as important as what you become."
  ];

  // ============================================================
  //  DOM REFS
  // ============================================================
  const taskListEl = document.getElementById('taskList');
  const feedListEl = document.getElementById('feedList');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const totalTasksEl = document.getElementById('totalTasks');
  const completedTasksEl = document.getElementById('completedTasks');
  const pendingTasksEl = document.getElementById('pendingTasks');
  const rateTasksEl = document.getElementById('rateTasks');
  const taskCountEl = document.getElementById('taskCount');
  const streakCountEl = document.getElementById('streakCount');
  const feedCountEl = document.getElementById('feedCount');
  const quoteBox = document.getElementById('quoteBox');

  const taskInput = document.getElementById('taskInput');
  const prioritySelect = document.getElementById('prioritySelect');
  const dueDateInput = document.getElementById('dueDateInput');
  const addBtn = document.getElementById('addBtn');
  const searchInput = document.getElementById('searchInput');
  const sortSelect = document.getElementById('sortSelect');
  const filterBtns = document.querySelectorAll('.filter-btn');
  const themeToggle = document.getElementById('themeToggle');
  const exportBtn = document.getElementById('exportBtn');
  const printBtn = document.getElementById('printBtn');
  const clearCompletedBtn = document.getElementById('clearCompletedBtn');
  const clearAllBtn = document.getElementById('clearAllBtn');

  // ============================================================
  //  HELPERS
  // ============================================================
  function getTimestamp() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function getDateStr() {
    return new Date().toISOString().split('T')[0];
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function randomQuote() {
    return quotes[Math.floor(Math.random() * quotes.length)];
  }

  function playSound(type) {
    try {
      const audio = new Audio();
      if (type === 'complete') {
        audio.src = 'data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAf3+AgICAgICAgICAgICAgICAgICAgICAAAAA=';
        audio.volume = 0.2;
        audio.play().catch(() => {});
      }
    } catch (e) {}
  }

  // ============================================================
  //  CORE FUNCTIONS
  // ============================================================
  function addTask(text, priority = 'medium', dueDate = '') {
    const trimmed = text.trim();
    if (!trimmed) return false;

    tasks.push({
      id: Date.now(),
      text: trimmed,
      done: false,
      priority: priority,
      dueDate: dueDate,
      createdAt: new Date().toISOString()
    });

    addFeedMessage(`➕ Added "${trimmed}"`);
    renderAll();
    return true;
  }

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.done = !task.done;
    const action = task.done ? '✅ Completed' : '↩️ Reopened';
    addFeedMessage(`${action} "${task.text}"`);
    if (task.done) playSound('complete');
    renderAll();
  }

  function deleteTask(id) {
    const idx = tasks.findIndex(t => t.id === id);
    if (idx === -1) return;
    const removed = tasks.splice(idx, 1)[0];
    addFeedMessage(`🗑️ Deleted "${removed.text}"`);
    renderAll();
  }

  function addFeedMessage(message) {
    feed.unshift({ message, timestamp: getTimestamp() });
    if (feed.length > 50) feed.pop();
  }

  function clearCompleted() {
    const completed = tasks.filter(t => t.done);
    if (completed.length === 0) {
      addFeedMessage('ℹ️ No completed tasks to clear');
      renderAll();
      return;
    }
    tasks = tasks.filter(t => !t.done);
    addFeedMessage(`🧹 Cleared ${completed.length} completed task(s)`);
    renderAll();
  }

  function clearAll() {
    if (tasks.length === 0) return;
    if (!confirm('Delete all tasks?')) return;
    tasks = [];
    addFeedMessage('🗑️ Cleared all tasks');
    renderAll();
  }

  // ============================================================
  //  FILTER, SORT, SEARCH
  // ============================================================
  function getFilteredTasks() {
    let filtered = [...tasks];

    // Filter
    if (currentFilter === 'active') filtered = filtered.filter(t => !t.done);
    else if (currentFilter === 'completed') filtered = filtered.filter(t => t.done);

    // Search
    const search = searchInput.value.toLowerCase().trim();
    if (search) filtered = filtered.filter(t => t.text.toLowerCase().includes(search));

    // Sort
    const sort = sortSelect.value;
    if (sort === 'newest') filtered.sort((a, b) => b.id - a.id);
    else if (sort === 'oldest') filtered.sort((a, b) => a.id - b.id);
    else if (sort === 'alphabetical') filtered.sort((a, b) => a.text.localeCompare(b.text));

    return filtered;
  }

  // ============================================================
  //
